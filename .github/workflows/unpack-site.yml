name: Unpack personal site

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/unpack-site.yml'

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Unpack site
        run: unzip -o personal-site-source.zip
      - name: Commit website
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add index.html styles.css script.js assets README.md vercel.json .gitignore
          git commit -m 'Deploy personal website' || exit 0
          git push
